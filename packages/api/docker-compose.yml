services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: urlaub
      POSTGRES_PASSWORD: urlaub
      POSTGRES_DB: urlaub
    ports:
      - "5432:5432"
    volumes:
      - urlaub_pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh

volumes:
  urlaub_pgdata:
